<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Malla Enfermeria UCEN</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0d1117;color:#e6edf3}
header{padding:16px;border-bottom:1px solid #30363d;background:#161b22}
h1{margin:0;font-size:24px}
p{color:#8b949e}
main{padding:16px}
.grid{display:grid;grid-template-columns:repeat(5,minmax(220px,1fr));gap:12px}
.sem{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:12px}
.sem h2{margin:0 0 10px 0;font-size:18px}
.ramo{width:100%;display:block;margin:0 0 8px 0;padding:10px;border:none;border-radius:10px;text-align:left;color:#fff;cursor:pointer}
.bloq{background:#2d333b}
.disp{background:#7d5f00}
.aprob{background:#1f6f3d}
#panel{position:fixed;right:16px;bottom:16px;width:360px;max-width:calc(100% - 32px);background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px}
.tag{display:inline-block;padding:6px 9px;border-radius:999px;background:#21262d;border:1px solid #30363d;margin:3px;font-size:12px}
button.sec{background:#58a6ff;color:#fff;border:none;padding:10px 12px;border-radius:10px;cursor:pointer}
@media (max-width:1000px){.grid{grid-template-columns:repeat(2,minmax(220px,1fr))}}
@media (max-width:700px){.grid{grid-template-columns:1fr}#panel{position:static;width:auto;max-width:none;margin-top:16px}}
</style>
</head>
<body>
<header>
<h1>Malla Interactiva Enfermeria UCEN</h1>
<p>Basada en la malla del PDF. Semestres 9 y 10 incluidos.</p>
<button class="sec" onclick="resetear()">Reiniciar progreso</button>
</header>
<main>
<div class="grid" id="grid"></div>
<div id="panel">
<h2>Selecciona un ramo</h2>
<p>Aqui veras que ramos abre.</p>
</div>
</main>
<script>
const cursos = [
{id:"fund",n:"Fundamentos de Enfermeria",s:1,p:[],a:["cuidados"]},
{id:"quim",n:"Quimica General y Organica",s:1,p:[],a:["bioq"]},
{id:"anato",n:"Anatomia Humana",s:1,p:[],a:["embri"]},
{id:"bio",n:"Biologia Celular y Genetica",s:1,p:[],a:["micro"]},
{id:"ing1",n:"Curso Sello Institucional I: Ingles I",s:1,p:[],a:["ing2"]},
{id:"vida1",n:"Formacion Basica para la Vida Academica I",s:1,p:[],a:["vida2"]},

{id:"cuidados",n:"Cuidados Basicos de Enfermeria",s:2,p:["fund"],a:["proc1"]},
{id:"bioq",n:"Bioquimica",s:2,p:["quim"],a:["saludpub"]},
{id:"embri",n:"Embriologia e Histologia",s:2,p:["anato"],a:["farma"]},
{id:"micro",n:"Microbiologia y Parasitologia",s:2,p:["bio"],a:["fisio"]},
{id:"ing2",n:"Curso Sello Institucional II: Ingles II",s:2,p:["ing1"],a:["sello3"]},
{id:"vida2",n:"Formacion Basica para la Vida Academica II",s:2,p:["vida1"],a:["sello3"]},

{id:"proc1",n:"Proceso y Cuidados de Enfermeria I",s:3,p:["cuidados"],a:["proc2"]},
{id:"saludpub",n:"Salud Publica",s:3,p:["bioq"],a:["farmaap","saludfam2"]},
{id:"farma",n:"Farmacologia",s:3,p:["embri"],a:["saludfam1"]},
{id:"fisio",n:"Fisiologia",s:3,p:["micro"],a:["fisiop"]},
{id:"bioest",n:"Bioestadistica",s:3,p:[],a:["gestionsalud","metodo"]},
{id:"sello3",n:"Curso Sello Institucional III",s:3,p:["ing2"],a:["sello4"]},

{id:"proc2",n:"Proceso y Cuidados de Enfermeria II",s:4,p:["proc1"],a:["gestion1"]},
{id:"farmaap",n:"Farmacologia Aplicada a la Enfermeria",s:4,p:["saludpub","farma"],a:["saludfam2"]},
{id:"saludfam1",n:"Enfermeria en Salud Familiar y Comunitaria I",s:4,p:["farma"],a:["medq","saludfam2"]},
{id:"fisiop",n:"Fisiopatologia",s:4,p:["fisio"],a:["geronto"]},
{id:"gestionsalud",n:"Gestion y Administracion en Salud",s:4,p:["bioest"],a:["mujer"]},
{id:"sello4",n:"Curso Sello Institucional IV",s:4,p:["sello3"],a:["ays"]},

{id:"gestion1",n:"Gestion y Administracion en Servicios de Enfermeria I",s:5,p:["proc2"],a:["gestion2"]},
{id:"saludfam2",n:"Enfermeria en Salud Familiar y Comunitaria II",s:5,p:["saludfam1","farmaap"],a:["saludfam3"]},
{id:"medq",n:"Enfermeria en Medico-Quirurgico",s:5,p:["saludfam1"],a:["urg"]},
{id:"geronto",n:"Enfermeria en Gerontologia y Geriatria",s:5,p:["fisiop"],a:["mental1"]},
{id:"mujer",n:"Enfermeria en Salud de la Mujer",s:5,p:["gestionsalud"],a:["pedia"]},
{id:"ays",n:"Interdisciplinar A+S",s:5,p:["sello4"],a:["inter"]},

{id:"gestion2",n:"Gestion y Administracion en Servicios de Enfermeria II",s:6,p:["gestion1"],a:["intern1"]},
{id:"saludfam3",n:"Enfermeria en Salud Familiar y Comunitaria III",s:6,p:["saludfam2"],a:["intern2"]},
{id:"urg",n:"Enfermeria en Urgencias",s:6,p:["medq"],a:["intern1"]},
{id:"mental1",n:"Enfermeria en Salud Mental I",s:6,p:["geronto"],a:["mental2"]},
{id:"metodo",n:"Metodologia de la Investigacion",s:6,p:["bioest"],a:["inv1"]},
{id:"inter",n:"Interdisciplinar",s:6,p:["ays"],a:["elec1"]},

{id:"pedia",n:"Enfermeria en Pediatria",s:7,p:["mujer"],a:["intern1"]},
{id:"mental2",n:"Enfermeria en Salud Mental II",s:7,p:["mental1"],a:["intern2"]},
{id:"inv1",n:"Investigacion en Enfermeria I",s:7,p:["metodo"],a:["inv2"]},
{id:"elec1",n:"Electivo Disciplinar I",s:7,p:["inter"],a:["elec2"]},

{id:"inv2",n:"Investigacion en Enfermeria II",s:8,p:["inv1"],a:["intern2"]},
{id:"elec2",n:"Electivo Disciplinar II",s:8,p:["elec1"],a:["intern2"]},

{id:"intern1",n:"Internado de Enfermeria I",s:9,p:["gestion2","urg","pedia"],a:["intern2"]},
{id:"intern2",n:"Internado de Enfermeria II",s:10,p:["intern1","saludfam3","mental2","inv2","elec2"],a:[]}
];
const aprobados = new Set(JSON.parse(localStorage.getItem("aprobados_ucen")||"[]"));
function curso(id){return cursos.find(x=>x.id===id)}
function disponible(c){return c.p.every(x=>aprobados.has(x))}
function estado(c){if(aprobados.has(c.id)) return "aprob"; return disponible(c) ? "disp" : "bloq"}
function guardar(){localStorage.setItem("aprobados_ucen", JSON.stringify([...aprobados]))}
function dibujar(){
 const grid=document.getElementById("grid"); grid.innerHTML="";
 for(let s=1;s<=10;s++){
   const box=document.createElement("div"); box.className="sem";
   box.innerHTML="<h2>"+s+" semestre</h2>";
   cursos.filter(c=>c.s===s).forEach(c=>{
     const b=document.createElement("button");
     const e=estado(c);
     b.className="ramo "+e;
     b.innerHTML=c.n+"<br><small>"+(e==="aprob"?"Aprobado":e==="disp"?"Disponible":"Bloqueado")+"</small>";
     b.onclick=()=>ver(c.id);
     box.appendChild(b);
   });
   grid.appendChild(box);
 }
}
function ver(id){
 const c=curso(id), panel=document.getElementById("panel");
 const pr=c.p.length?c.p.map(x=>"<span class='tag'>"+curso(x).n+"</span>").join(""):"<span class='tag'>No tiene</span>";
 const ab=c.a.length?c.a.map(x=>"<span class='tag'>"+curso(x).n+"</span>").join(""):"<span class='tag'>No abre ramos directos</span>";
 const ap=aprobados.has(c.id);
 panel.innerHTML="<h2>"+c.n+"</h2><p><b>Semestre:</b> "+c.s+"</p><p><b>Prerrequisitos:</b></p><div>"+pr+"</div><p><b>Ramos que abre:</b></p><div>"+ab+"</div><p><button class='sec' onclick='toggle(""+c.id+"")'>"+(ap?"Quitar aprobado":"Marcar como aprobado")+"</button></p>";
}
function toggle(id){ if(aprobados.has(id)) aprobados.delete(id); else aprobados.add(id); guardar(); dibujar(); ver(id); }
function resetear(){ aprobados.clear(); guardar(); dibujar(); document.getElementById("panel").innerHTML="<h2>Selecciona un ramo</h2><p>Aqui veras que ramos abre.</p>"; }
dibujar();
</script>
</body>
</html>
